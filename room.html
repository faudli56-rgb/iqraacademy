<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>قاعتنا التدريبية الافتراضية - أكاديمية اقرأ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://meet.jit.si/external_api.js"></script>
    <script src="api.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .hidden-visually { opacity: 0.01; pointer-events: none; position: absolute; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .reaction-emoji {
            position: absolute; bottom: 0; font-size: 2rem; animation: floatUp 3s ease-in-out forwards; opacity: 1; z-index: 50; pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 1; transform: translateY(-50px) scale(1.2) rotate(-15deg); }
            80% { opacity: 0.8; }
            100% { transform: translateY(-300px) scale(1) rotate(20deg); opacity: 0; }
        }
        
        /* وضع ملء الشاشة الفعلي للفيديو */
        .video-fullscreen-mode {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100dvh !important;
            z-index: 99999 !important;
            background-color: #000 !important;
            display: flex !important;
            flex-direction: column !important;
        }
        .video-fullscreen-mode #youtube-container,
        .video-fullscreen-mode #jitsi-container,
        .video-fullscreen-mode #whiteboard-container {
            flex: 1 !important;
            height: 100% !important;
        }
    </style>
</head>
<body class="bg-gray-50 h-[100dvh] flex flex-col overflow-hidden">

    <!-- شريط التنقل العلوي -->
    <header class="bg-[#0B1F4D] text-white shadow-md p-3 lg:p-4 flex justify-between items-center z-10 border-b-4 border-[#D4A017] shrink-0">
        <div class="flex items-center gap-2 lg:gap-3">
            <i class="fas fa-graduation-cap text-xl lg:text-2xl text-[#D4A017]"></i>
            <h1 class="text-sm lg:text-xl font-bold truncate">نرحب بكم في قاعتنا التدريبية</h1>
        </div>
        
        <div class="flex gap-1.5 lg:gap-2 items-center">
            <!-- زر استوديو الإدارة -->
            <button id="btn-show-assistant" onclick="toggleAssistantPanel()" class="hidden bg-gradient-to-r from-yellow-400 to-[#D4A017] text-black px-3 lg:px-4 py-1.5 rounded-lg text-[10px] lg:text-sm font-black shadow-md hover:scale-105 transition-all cursor-pointer">
                <i class="fas fa-cogs lg:ml-1"></i> <span class="hidden sm:inline">استوديو الإدارة</span><span class="sm:hidden">الإدارة</span>
            </button>

            <button onclick="toggleWhiteboard()" class="bg-indigo-600 hover:bg-indigo-700 px-2 lg:px-3 py-1.5 rounded text-xs lg:text-sm transition shadow hidden sm:block">
                <i class="fas fa-chalkboard"></i> السبورة
            </button>
            <button onclick="refreshStream()" class="bg-gray-700 hover:bg-gray-600 px-2 lg:px-3 py-1.5 rounded text-xs lg:text-sm transition shadow" title="تحديث البث">
                <i class="fas fa-sync-alt"></i> تحديث
            </button>
            <button onclick="window.close()" class="bg-rose-600 hover:bg-rose-700 px-2 lg:px-3 py-1.5 rounded text-xs lg:text-sm transition shadow">
                <i class="fas fa-sign-out-alt"></i> خروج
            </button>
        </div>
    </header>

    <!-- المحتوى الرئيسي -->
    <main class="flex-1 flex flex-col lg:flex-row w-full h-full overflow-hidden relative">
        
        <!-- القسم الأيمن: منصة العرض -->
        <section id="presentation-section" class="w-full lg:flex-1 relative bg-black flex flex-col aspect-video lg:aspect-auto z-10 transition-all duration-300 shadow-md">
            
            <!-- زر التكبير الفعلي -->
            <button onclick="toggleVideoFullscreen()" id="btn-fullscreen" class="absolute top-3 left-3 z-[90] bg-[#0B1F4D] px-3 py-1.5 rounded-full flex items-center justify-center gap-1.5 shadow-[0_0_10px_rgba(0,0,0,0.5)] border border-white/80 cursor-pointer hover:scale-105 transition-transform" style="opacity: 1 !important;">
                <i class="fas fa-expand" style="color: #ffffff !important; font-size: 11px !important;"></i>
                <span class="text-white font-bold" style="font-size: 10px !important;">ملء الشاشة</span>
            </button>

            <!-- زر الإيموجي -->
            <div class="absolute top-3 right-3 z-[60] bg-black/40 backdrop-blur-sm px-3 py-1.5 rounded-full flex items-center gap-3 border border-white/10">
                <button onclick="triggerReaction('❤️')" class="text-sm hover:scale-125 transition transform">❤️</button>
                <button onclick="triggerReaction('👏')" class="text-sm hover:scale-125 transition transform">👏</button>
                <button onclick="triggerReaction('✋')" class="text-sm hover:scale-125 transition transform">✋</button>
                <button onclick="triggerReaction('💡')" class="text-sm hover:scale-125 transition transform">💡</button>
            </div>

            <div id="youtube-container" class="relative w-full h-full overflow-hidden flex items-center justify-center bg-black">
                
                <div id="no-video-msg" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 z-0">
                    <i class="fas fa-video-slash text-3xl lg:text-5xl mb-2 opacity-50"></i>
                    <p class="text-xs lg:text-sm font-bold">البث لم يبدأ بعد</p>
                </div>

                <iframe id="yt-iframe" class="absolute inset-0 w-full h-full border-0 pointer-events-auto z-10" 
                    src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen">
                </iframe>

                <div id="reaction-fly-zone" class="absolute bottom-10 left-4 w-24 h-40 pointer-events-none overflow-hidden z-30"></div>

                <!-- شريط المعلومات وشريط التمرير (Marquee) الذي تم استرجاعه -->
                <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black/90 to-transparent pt-12 pb-2 px-3 lg:px-6 flex items-end justify-between pointer-events-none z-20">
                    <div class="flex flex-col gap-2 w-full lg:max-w-[80%]">
                        <div class="flex items-center gap-2">
                            <span class="flex h-2 w-2 relative">
                              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-500 opacity-75"></span>
                              <span class="relative inline-flex rounded-full h-2 w-2 bg-rose-600"></span>
                            </span>
                            <span class="text-white font-black text-[9px] bg-rose-600 px-1 py-0.5 rounded tracking-widest">مباشر</span>
                            <h2 id="room-title" class="text-white font-bold text-[10px] lg:text-sm drop-shadow-md truncate">قاعة التدريب التفاعلية</h2>
                        </div>
                        <!-- شريط التمرير -->
                        <div class="w-full overflow-hidden bg-black/50 backdrop-blur-md border-r-2 border-[#D4A017] rounded-l-md pr-2 py-1 flex items-center shadow-inner mt-1">
                            <i class="fas fa-bullhorn text-[#D4A017] text-[10px] lg:text-xs ml-2"></i>
                            <marquee behavior="scroll" direction="right" scrollamount="4" class="text-slate-200 text-[10px] lg:text-xs font-bold pt-0.5 w-full">
                                أهلاً بكم في قاعة البث المباشر لأكاديمية اقرأ | نرجو الالتزام بآداب النقاش والمشاركة الفعالة | مهارة اليوم... مشروع الغد!
                            </marquee>
                        </div>
                    </div>
                </div>
            </div>

            <div id="whiteboard-container" class="hidden absolute inset-0 w-full h-full bg-white z-40">
                <iframe src="https://excalidraw.com/" class="w-full h-full border-0"></iframe>
                <button onclick="toggleWhiteboard()" class="absolute top-4 right-4 bg-rose-600 text-white px-3 py-2 rounded-xl shadow-lg font-bold text-xs z-50">إغلاق السبورة</button>
            </div>

            <div id="jitsi-container" class="hidden absolute inset-0 w-full h-full bg-gray-800 z-40"></div>
        </section>

        <!-- القسم الأيسر: لوحة التفاعل -->
        <aside class="flex-1 lg:w-[380px] lg:flex-none bg-white border-t lg:border-t-0 lg:border-l flex flex-col shadow-inner z-20 relative overflow-hidden">
            
            <div class="flex border-b text-center font-bold text-xs lg:text-sm text-[#0B1F4D] bg-blue-50 shadow-sm shrink-0">
                <button onclick="switchInteractionTab('chat')" id="tab-chat-btn" class="flex-1 py-2.5 border-b-2 border-[#0B1F4D]">الدردشة</button>
                <button onclick="switchInteractionTab('attendees')" id="tab-attend-btn" class="flex-1 py-2.5 border-b-2 border-transparent text-gray-500">الحضور (<span id="attendee-count">0</span>)</button>
            </div>

            <!-- الدردشة -->
            <div id="interaction-chat" class="flex-1 flex flex-col h-full overflow-hidden">
                <div id="messages-area" class="flex-1 overflow-y-auto p-3 space-y-3 bg-slate-50">
                    <div class="text-center text-[10px] text-slate-400 my-2">-- بداية المحادثة --</div>
                </div>
                <div class="p-2 lg:p-3 border-t bg-white shrink-0">
                    <div class="flex gap-2">
                        <input type="text" id="msg-input" class="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-[#D4A017] focus:ring-1 focus:ring-[#D4A017] transition" placeholder="اكتب هنا..." onkeypress="if(event.key === 'Enter') sendMessage()">
                        <button onclick="sendMessage()" class="bg-[#0B1F4D] text-white px-4 rounded-lg hover:bg-[#132F6B] transition shadow-md">
                            <i class="fas fa-paper-plane text-xs"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- الحضور -->
            <div id="interaction-attendees" class="hidden flex-1 overflow-y-auto p-3 bg-slate-50">
                <ul id="attendees-list" class="space-y-2 text-xs text-slate-700"></ul>
            </div>
            
            <!-- لوحة المساعد -->
            <div id="assistant-panel" class="hidden absolute bottom-0 left-0 w-full bg-slate-800 text-white p-3 lg:p-4 shadow-[0_-10px_20px_rgba(0,0,0,0.2)] transform translate-y-full transition-transform duration-300 rounded-t-xl z-50">
                <div class="flex justify-between items-center mb-3 border-b border-slate-600 pb-2">
                    <h3 class="font-bold text-[11px] lg:text-xs"><i class="fas fa-tools text-[#D4A017]"></i> استوديو الإدارة</h3>
                    <button onclick="toggleAssistantPanel()" class="text-gray-400 hover:text-white transition p-1"><i class="fas fa-times text-sm"></i></button>
                </div>
                <div class="grid grid-cols-2 gap-2 text-[10px] lg:text-xs font-bold mb-3">
                    <button onclick="triggerWorkshopsStatusForEveryone(true)" class="bg-indigo-600 p-2 rounded-lg hover:bg-indigo-500 transition shadow">تشغيل الورش <i class="fas fa-users ml-1"></i></button>
                    <button onclick="triggerWorkshopsStatusForEveryone(false)" class="bg-slate-500 p-2 rounded-lg hover:bg-slate-400 transition shadow text-white">إيقاف الورش <i class="fas fa-undo ml-1"></i></button>
                    <button onclick="generateTrainerLink()" class="bg-teal-600 p-2 rounded-lg hover:bg-teal-500 transition shadow">دعوة مدرب <i class="fas fa-link ml-1"></i></button>
                    <button onclick="endSession()" class="bg-rose-600 p-2 rounded-lg hover:bg-rose-500 transition shadow">إنهاء اللقاء <i class="fas fa-door-closed ml-1"></i></button>
                </div>
                <div class="flex flex-col gap-1.5 bg-slate-700 p-2 rounded-lg border border-slate-600">
                    <label class="text-[9px] text-slate-300">تحديث مسار البث (يوتيوب ID):</label>
                    <div class="flex gap-2">
                        <input type="text" id="emergency-link" placeholder="مثال: dQw4w9WgXcQ" class="flex-1 text-black px-2 py-1 rounded text-[10px] font-mono outline-none">
                        <button onclick="updateStreamLink()" class="bg-[#D4A017] text-[#0B1F4D] px-2 py-1 rounded text-[10px] hover:bg-yellow-500 font-bold transition shadow">تحديث</button>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('invite') === 'trainer') {
            sessionStorage.setItem('role', 'trainer');
            sessionStorage.setItem('name', 'المدرب');
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        let currentUser = {
            id: sessionStorage.getItem('code') || localStorage.getItem('userCode') || 'S-' + Math.floor(Math.random() * 10000),
            name: sessionStorage.getItem('name') || localStorage.getItem('userName') || sessionStorage.getItem('username') || 'متدرب ضيف',
            role: sessionStorage.getItem('role') || localStorage.getItem('userRole') || 'student'
        };

        let messageBatch = []; 
        let jitsiApi = null;
        let lastSyncedMsgId = 0; 
        let currentRoomState = { live_yt_id: "", workshops_active: "false" };

        if (currentUser.role === 'admin' || currentUser.role === 'assistant' || currentUser.role === 'marketer' || currentUser.role === 'trainer') {
            document.getElementById('btn-show-assistant').classList.remove('hidden');
            if(document.getElementById('msg-input')) document.getElementById('msg-input').placeholder = "رسالة إدارية للمجموعة...";
        }

        function switchInteractionTab(tab) {
            const chatDiv = document.getElementById('interaction-chat');
            const attendDiv = document.getElementById('interaction-attendees');
            const chatBtn = document.getElementById('tab-chat-btn');
            const attendBtn = document.getElementById('tab-attend-btn');

            if (tab === 'chat') {
                chatDiv.classList.remove('hidden'); attendDiv.classList.add('hidden');
                chatBtn.classList.add('border-[#0B1F4D]'); attendBtn.classList.remove('border-[#0B1F4D]');
            } else {
                chatDiv.classList.add('hidden'); attendDiv.classList.remove('hidden');
                attendBtn.classList.add('border-[#0B1F4D]'); chatBtn.classList.remove('border-[#0B1F4D]');
            }
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            const msgObj = {
                id: Date.now(), sender: currentUser.name, text: text, type: 'chat',
                timestamp: new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'})
            };

            displayMessage(msgObj);
            input.value = '';
            messageBatch.push(msgObj);
        }

        function displayMessage(msg) {
            const area = document.getElementById('messages-area');
            const div = document.createElement('div');
            div.className = "bg-white p-2 lg:p-3 rounded-lg shadow-sm border border-slate-100";
            
            const header = document.createElement('div');
            header.className = "flex justify-between items-center mb-1";
            
            const senderSpan = document.createElement('span');
            senderSpan.className = "font-bold text-[11px] lg:text-xs text-[#0B1F4D]";
            if (msg.sender.includes('إدارة') || msg.sender === 'المدرب' || msg.sender === 'المساعد الآلي') {
                senderSpan.innerHTML = `<i class="fas fa-shield-alt text-[#D4A017] ml-1"></i> ${msg.sender}`;
            } else {
                senderSpan.textContent = msg.sender;
            }
            
            const timeSpan = document.createElement('span');
            timeSpan.className = "text-[9px] lg:text-[10px] text-gray-400 font-mono";
            timeSpan.textContent = msg.timestamp;

            header.appendChild(senderSpan);
            header.appendChild(timeSpan);
            
            const bodyP = document.createElement('p');
            bodyP.className = "text-[11px] lg:text-sm text-slate-700 leading-relaxed";
            bodyP.textContent = msg.text; 

            div.appendChild(header); div.appendChild(bodyP);
            area.appendChild(div); area.scrollTop = area.scrollHeight;
        }

        function triggerReaction(emoji) {
            const zone = document.getElementById('reaction-fly-zone');
            if (!zone) return;
            const el = document.createElement('div');
            el.className = 'reaction-emoji'; el.innerText = emoji;
            el.style.left = Math.random() * 70 + '%'; 
            zone.appendChild(el);
            setTimeout(() => el.remove(), 3000); 
        }

        let isVideoFullscreen = false;
        function toggleVideoFullscreen() {
            const section = document.getElementById('presentation-section');
            const icon = document.querySelector('#btn-fullscreen i');
            const text = document.querySelector('#btn-fullscreen span');
            
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
                if (section.requestFullscreen) section.requestFullscreen();
                else if (section.webkitRequestFullscreen) section.webkitRequestFullscreen();
                else if (section.msRequestFullscreen) section.msRequestFullscreen();
                
                section.classList.add('video-fullscreen-mode');
                icon.classList.replace('fa-expand', 'fa-compress');
                if(text) text.innerText = "تصغير";
                isVideoFullscreen = true;
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
                
                section.classList.remove('video-fullscreen-mode');
                icon.classList.replace('fa-compress', 'fa-expand');
                if(text) text.innerText = "ملء الشاشة";
                isVideoFullscreen = false;
            }
        }

        document.addEventListener('fullscreenchange', exitHandler);
        document.addEventListener('webkitfullscreenchange', exitHandler);
        function exitHandler() {
            if (!document.fullscreenElement && !document.webkitIsFullScreen) {
                const section = document.getElementById('presentation-section');
                const icon = document.querySelector('#btn-fullscreen i');
                const text = document.querySelector('#btn-fullscreen span');
                section.classList.remove('video-fullscreen-mode');
                if(icon) icon.classList.replace('fa-compress', 'fa-expand');
                if(text) text.innerText = "ملء الشاشة";
                isVideoFullscreen = false;
            }
        }

        function toggleAssistantPanel() {
            const panel = document.getElementById('assistant-panel');
            panel.classList.toggle('translate-y-full');
            panel.classList.toggle('hidden');
        }

        function toggleWhiteboard() {
            const wb = document.getElementById('whiteboard-container');
            wb.classList.toggle('hidden');
        }

        function refreshStream() {
            const iframe = document.getElementById('yt-iframe');
            iframe.src = iframe.src; 
        }

        function generateTrainerLink() {
            const baseUrl = window.location.href.split('?')[0];
            const trainerLink = baseUrl + "?invite=trainer";
            navigator.clipboard.writeText(trainerLink).then(() => {
                alert("تم النسخ بنجاح! 🔗\n\nالرابط الحقيقي هو:\n" + trainerLink);
            }).catch(() => {
                prompt("يرجى نسخ الرابط يدوياً من هنا:", trainerLink);
            });
        }

        function triggerWorkshopsStatusForEveryone(start) {
            const msg = start ? 'بدء ورشة التفاعل للجميع؟' : 'إغلاق الورش والعودة للبث الرئيسي؟';
            if (confirm(msg)) {
                if(typeof callAPI === 'function') {
                    callAPI('updateRoomSettings', { key: 'workshops_active', value: start ? 'true' : 'false' }).then(() => {
                        if(start) startWorkshops(false); else closeWorkshops(false);
                    });
                } else {
                    if(start) startWorkshops(false); else closeWorkshops(false);
                }
            }
        }

        function startWorkshops(isAutoTriggered) {
            document.getElementById('youtube-container').classList.add('hidden');
            document.getElementById('whiteboard-container').classList.add('hidden');
            document.getElementById('jitsi-container').classList.remove('hidden');
            
            const roomNumber = 'IqraAcademy_Live_Workshop_Official'; 
            const isAdmin = (currentUser.role === 'admin' || currentUser.role === 'trainer' || currentUser.role === 'assistant');

            const options = {
                roomName: roomNumber, width: '100%', height: '100%',
                parentNode: document.getElementById('jitsi-container'),
                userInfo: { displayName: currentUser.name },
                configOverwrite: { 
                    prejoinPageEnabled: true, // تفعيل شاشة التجهيز للجميع لفك تجميد الكاميرا والمايك
                    startWithAudioMuted: true,
                    startWithVideoMuted: true,
                    disableDeepLinking: true
                },
                interfaceConfigOverwrite: {
                    SHOW_JITSI_WATERMARK: false,
                    // أضفنا الإعدادات (settings) للطلاب ليتمكنوا من اختيار المايك الخاص بهم
                    TOOLBAR_BUTTONS: isAdmin ? 
                        ['microphone', 'camera', 'desktop', 'fullscreen', 'profile', 'chat', 'settings', 'raisehand', 'videoquality', 'participants-pane', 'tileview', 'mute-everyone', 'security'] : 
                        ['microphone', 'camera', 'raisehand', 'fullscreen', 'chat', 'tileview', 'settings'],
                    // أضفنا قسم الأجهزة (devices) للطلاب
                    SETTINGS_SECTIONS: isAdmin ? ['devices', 'language', 'moderator', 'profile', 'sounds'] : ['devices', 'language', 'profile']
                }
            };
            
            if (jitsiApi) jitsiApi.dispose();
            jitsiApi = new JitsiMeetExternalAPI('meet.jit.si', options);
            if(!isAutoTriggered && isAdmin) alert("تم فتح الورشة التفاعلية وتوحيد الغرفة!");
        }

        function closeWorkshops(isAutoTriggered) {
            if (jitsiApi) { jitsiApi.dispose(); jitsiApi = null; }
            document.getElementById('jitsi-container').classList.add('hidden');
            document.getElementById('whiteboard-container').classList.add('hidden');
            document.getElementById('youtube-container').classList.remove('hidden');
            if(isAutoTriggered) refreshStream(); 
        }

        function updateStreamLink() {
            const newId = document.getElementById('emergency-link').value.trim();
            if(newId && typeof callAPI === 'function') {
                callAPI('updateRoomSettings', { key: 'live_yt_id', value: newId }).then(() => {
                    alert("تم تحديث مسار بث يوتيوب بنجاح.");
                    toggleAssistantPanel();
                });
            }
        }

        function endSession() {
            if(confirm("هل ننهي اللقاء للجميع؟")) {
                if(typeof callAPI === 'function') {
                    callAPI('updateRoomSettings', { key: 'live_yt_id', value: '' }); 
                    callAPI('updateRoomSettings', { key: 'workshops_active', value: 'false' });
                }
                document.body.innerHTML = `
                    <div class="h-screen flex flex-col items-center justify-center bg-[#0B1F4D] text-white text-center px-4">
                        <i class="fas fa-check-circle text-5xl lg:text-6xl text-emerald-400 mb-6"></i>
                        <h1 class="text-2xl lg:text-3xl font-black mb-3">شكراً لجهودكم</h1>
                        <p class="text-blue-200 text-xs lg:text-sm">انتهى اللقاء التدريبي بنجاح.</p>
                    </div>`;
            }
        }

        // مزامنة البيانات بين الأجهزة (تعمل بشكل صحيح إذا كان رابط Vercel والسيرفر متصلين)
        setInterval(() => {
            if (messageBatch.length > 0 && typeof callAPI === 'function') {
                const payload = [...messageBatch];
                messageBatch = []; 
                callAPI('saveChatBatch', { messages: payload }).catch(() => messageBatch.push(...payload));
            }
            if (typeof callAPI === 'function') {
                callAPI('syncRoomState', { lastMsgId: lastSyncedMsgId }).then(res => {
                    if (res && res.success) {
                        if (res.messages) res.messages.forEach(msg => { if (msg.sender !== currentUser.name) displayMessage(msg); lastSyncedMsgId = Math.max(lastSyncedMsgId, msg.id); });
                        if (res.state.live_yt_id && currentRoomState.live_yt_id !== res.state.live_yt_id) {
                            currentRoomState.live_yt_id = res.state.live_yt_id;
                            let vidId = res.state.live_yt_id;
                            document.getElementById('yt-iframe').src = `https://www.youtube.com/embed/${vidId}?autoplay=1&modestbranding=1&controls=0&rel=0&playsinline=1`;
                            document.getElementById('no-video-msg').style.display = 'none'; 
                        }
                        // استقبال أمر تشغيل الورشة من الإدارة للأجهزة الأخرى
                        if (res.state.workshops_active === 'true' && document.getElementById('jitsi-container').classList.contains('hidden')) startWorkshops(true); 
                        else if (res.state.workshops_active === 'false' && !document.getElementById('jitsi-container').classList.contains('hidden')) closeWorkshops(true);
                    }
                }).catch(e => console.log(e));
            }
        }, 5000);
// تسجيل وقت الدخول عند فتح القاعة
const joinTime = new Date().toISOString();

// إرسال بيانات الحضور عند إغلاق أو تحديث الصفحة
window.addEventListener('beforeunload', function () {
    const leaveTime = new Date().toISOString();
    if (typeof callAPI === 'function') {
        callAPI('recordAttendance', {
            orderId: currentUser.id,
            studentName: currentUser.name,
            course: "غرفة البث المباشر",
            joinTime: joinTime,
            leaveTime: leaveTime
        });
    }
});
    </script>
